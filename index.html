<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jersey Control Pro 2.0</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:linear-gradient(135deg,#0b3d91,#0a84ff);
min-height:100vh;
padding:15px;
}
h1{
text-align:center;
color:white;
margin-bottom:15px;
}
.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}
.box{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
font-weight:bold;
}
.box span{
display:block;
font-size:20px;
margin-top:5px;
color:#0a84ff;
}
input,
select,
button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}
button{
background:#0a84ff;
color:white;
border:none;
font-weight:bold;
}
table{
width:100%;
border-collapse:collapse;
font-size:12px;
}
th{
background:#0a84ff;
color:white;
padding:8px;
}
td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}
img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}
.estado-pagada{
background:#28a745;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}
.estado-camino{
background:#007bff;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}
.estado-entregada{
background:#ffc107;
color:black;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}
.estado-stk{
background:#6c757d;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}
</style>
</head>
<body>
<h1>⚽ Jersey Control Pro 2.0</h1>
<div class="dashboard">
<div class="box">
Inversión
<span id="inv">0</span>
</div>
<div class="box">
Ganancia
<span id="gan">0</span>
</div>
<div class="box">
Ingresos
<span id="ing">0</span>
</div>
<div class="box">
Pendiente
<span id="pen">0</span>
</div>
</div>
<div class="card">
<h3>➕ Agregar Jersey</h3>
<input id="nombre" placeholder="Nombre de la playera">
<input id="equipo" placeholder="Equipo">
<select id="talla">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>2XL</option>
<option>3XL</option>
<option>4XL</option>
</select>
<input id="cliente" placeholder="Cliente">
<input id="foto" type="file" accept="image/*">
<input id="costo" type="number" placeholder="Costo">
<input id="venta" type="number" placeholder="Precio de venta">
<input id="abonado" type="number" placeholder="Abonado">
<select id="estado">
<option>STK</option>
<option>EN CAMINO</option>
<option>ENTREGADA</option>
<option>PAGADA</option>
</select>
<button onclick="agregarRegistro()">
💾 Guardar Jersey
</button>
</div>
<div class="card">
<h3>🔍 Buscar</h3>
<select id="filtro">
<option value="">Todos los estados</option>
<option value="STK">STK</option>
<option value="EN CAMINO">EN CAMINO</option>
<option value="ENTREGADA">ENTREGADA</option>
<option value="PAGADA">PAGADA</option>
</select>
</div>
<div class="card">
<h3>📦 Inventario</h3>
<div style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Playera</th>
<th>Equipo</th>
<th>Talla</th>
<th>Cliente</th>
<th>Fecha</th>
<th>Venta</th>
<th>Abonado</th>
<th>Restante</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>
<script>
let registros =
JSON.parse(localStorage.getItem("registros")) || [];
document.getElementById("buscar")
.addEventListener("keyup", mostrar);
document.getElementById("filtro")
.addEventListener("change", mostrar);
function guardarDatos(){
localStorage.setItem(
"registros",
JSON.stringify(registros)
);
}
function convertirImagen(file){
return new Promise((resolve)=>{
const reader = new FileReader();
reader.onload = e => resolve(e.target.result);
reader.readAsDataURL(file);
});
}
async function agregarRegistro(){
const archivo =
document.getElementById("foto").files[0];
let imagen = "";
if(archivo){
imagen = await convertirImagen(archivo);
}
const registro = {
nombre:
document.getElementById("nombre").value,
equipo:
document.getElementById("equipo").value,
talla:
document.getElementById("talla").value,
cliente:
document.getElementById("cliente").value,
foto:imagen,
costo:Number(
document.getElementById("costo").value
),
venta:Number(
document.getElementById("venta").value
),
abonado:Number(
document.getElementById("abonado").value || 0
),
fecha:new Date().toLocaleDateString(),
estado:
document.getElementById("estado").value
};
registro.restante =
registro.venta - registro.abonado;
registro.ganancia =
registro.venta - registro.costo;
if(registro.restante <= 0){
registro.restante = 0;
registro.estado = "PAGADA";
}
registros.push(registro);
guardarDatos();
mostrar();
actualizarTotales();
document.getElementById("nombre").value="";
document.getElementById("equipo").value="";
document.getElementById("cliente").value="";
document.getElementById("foto").value="";
document.getElementById("costo").value="";
document.getElementById("venta").value="";
document.getElementById("abonado").value="";
}
function mostrar(){
let texto =
document.getElementById("buscar")
.value.toLowerCase();
let filtro =
document.getElementById("filtro").value;
let html = "";
registros.forEach((r,i)=>{
if(
(
r.nombre.toLowerCase().includes(texto) ||
r.equipo.toLowerCase().includes(texto) ||
r.cliente.toLowerCase().includes(texto)
)
&&
(
filtro === "" ||
r.estado === filtro
)
){
let estadoHTML="";
if(r.estado==="PAGADA"){
estadoHTML =
'<span class="estado-pagada">PAGADA</span>';
}
else if(r.estado==="EN CAMINO"){
estadoHTML =
'<span class="estado-camino">EN CAMINO</span>';
}
else if(r.estado==="ENTREGADA"){
estadoHTML =
'<span class="estado-entregada">ENTREGADA</span>';
}
else{
estadoHTML =
'<span class="estado-stk">STK</span>';
}
html += `
<tr>
<td>${r.foto ? `<img src="${r.foto}">` : "📷"}</td>
<td>${r.nombre}</td>
<td>${r.equipo}</td>
<td>${r.talla}</td>
<td>${r.cliente}</td>
<td>${r.fecha}</td>
<td>$${r.venta}</td>
<td>$${r.abonado}</td>
<td>$${r.restante}</td>
<td>${estadoHTML}</td>
<td>
<button onclick="editar(${i})">✏️</button>
<button onclick="eliminarRegistro(${i})">🗑️</button>
</td>
</tr>
`;
}
});
document.getElementById("tabla").innerHTML = html;
  function actualizarTotales(){

let inversion = 0;
let ingresos = 0;
let pendiente = 0;
let ganancia = 0;

registros.forEach(r=>{

inversion += Number(r.costo);

ingresos += Number(r.abonado);

pendiente += Number(r.restante);

ganancia += Number(r.ganancia);

});

document.getElementById(“inv”)
.innerText = inversion;

document.getElementById(“ing”)
.innerText = ingresos;

document.getElementById(“pen”)
.innerText = pendiente;

document.getElementById(“gan”)
.innerText = ganancia;

}

function eliminarRegistro(i){

if(!confirm(”¿Eliminar registro?”)){
return;
}

registros.splice(i,1);

guardarDatos();

mostrar();

actualizarTotales();

}

function editar(i){

let nuevoAbono = prompt(
“¿Cuánto abonó ahora?”,
“”
);

if(
nuevoAbono===null ||
nuevoAbono===””
){
return;
}

registros[i].abonado +=
Number(nuevoAbono);

registros[i].restante =
registros[i].venta -
registros[i].abonado;

if(
registros[i].restante <= 0
){

registros[i].restante = 0;

registros[i].estado = “PAGADA”;

}

guardarDatos();

mostrar();

actualizarTotales();

}

mostrar();

actualizarTotales();

</script>
</body>
</html>
