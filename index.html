<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jersey Control Pro</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#0a84ff;
color:white;
border:none;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

  .box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.estado-pagada{
    background:#28a745;
    color:white;
    font-weight:bold;
    border-radius:6px;
    padding:4px 8px;
    text-align:center;
}
</style>
</head>

<body>

<h1>⚽ Jersey Control Pro</h1>

<div class="dashboard">
<div class="box">
Inversión<br>
$<span id="inv">0</span>
</div>

<div class="box">
Ganancia<br>
$<span id="gan">0</span>
</div>

<div class="box">
Ingresos<br>
$<span id="ing">0</span>
</div>

<div class="box">
Pendiente<br>
$<span id="pen">0</span>
</div>
</div>

<div class="card">
<h3>Agregar Playera</h3>

<input id="nombre" placeholder="Nombre de

<input id="talla" placeholder="Talla">

<input id="cliente" placeholder="Cliente">

<input id="costo" type="number" placeholder="Costo">

<input id="venta" type="number" placeholder="Precio de venta">

<input id="abonado" type="number" placeholder="Abonado">

<select id="estado">
<option>STK</option>
<option>EN CAMINO</option>
<option>ENTREGADA</option>
</select>

<button onclick="agregarRegistro()">Agregar</button>

</div>
<div class="card">
<h3>🔍 Buscar</h3>

<input id="buscar" placeholder="Buscar playera o cliente">
</div>

<div class="card">
<h3>📦 Inventario</h3>

<table>
<thead>
<tr>
  <select id="filtro">
  <option value="">Todos</option>
  <option value="STK">STK</option>
  <option value="EN CAMINO">EN CAMINO</option>
  <option value="ENTREGADA">ENTREGADA</option>
  <option value="PAGADA">PAGADA</option>
</select>
<th>Playera</th>
<th>Talla</th>
<th>Cliente</th>
<th>Fecha</th>
<th>Venta</th>
<th>Abonado</th>
<th>Restante</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>
</div>

<script>

let registros = JSON.parse(localStorage.getItem("registros")) || [];

document.getElementById("buscar").addEventListener("keyup",mostrar);
document.getElementById("buscar")
.addEventListener("keyup", mostrar);

document.getElementById("filtro")
.addEventListener("change", mostrar);
                      
function agregarRegistro(){

const registro={
nombre:document.getElementById("nombre").value,
talla:document.getElementById("talla").value,
cliente:document.getElementById("cliente").value,
costo:Number(document.getElementById("costo").value),
venta:Number(document.getElementById("venta").value),
abonado:Number(document.getElementById("abonado").value || 0),
fecha:new Date().toLocaleDateString(),
estado:document.getElementById("estado").value
};

registro.restante=registro.venta-registro.abonado;
registro.ganancia=registro.venta-registro.costo;

registros.push(registro);
localStorage.setItem("registros", JSON.stringify(registros));
actualizarTotales();
mostrar();

}

function mostrar(){

let texto=document.getElementById("buscar").value.toLowerCase();

let html="";

registros.forEach((r,i)=>{

if(
r.nombre.toLowerCase().includes(texto) ||
r.cliente.toLowerCase().includes(texto)
){

html+=`
<tr>
<td>${r.nombre}</td>
<td>${r.talla}</td>
<td>${r.cliente}</td>
<td>${r.fecha}</td>
<td>$${r.venta}</td>
<td>$${r.abonado}</td>
<td>$${r.restante}</td>
<td>
${r.estado === "PAGADA"
 ? '<span class="estado-pagada">PAGADA</span>'
 : r.estado}
</td>
<td>
<button onclick="editar(${i})">✏️</button>
<button onclick="eliminarRegistro(${i})">🗑️</button>
</td>
</tr>
`;

}

});

document.getElementById("tabla").innerHTML=html;

}


function actualizarTotales(){

let inversion = 0;
let ingresos = 0;
let pendiente = 0;
let ganancia = 0;

registros.forEach((r,i)=>{
  inversion += r.costo;
  ingresos += r.abonado;
  pendiente += r.restante;
  ganancia += r.ganancia;
});

document.getElementById("inv").innerText = inversion;
document.getElementById("ing").innerText = ingresos;
document.getElementById("pen").innerText = pendiente;
document.getElementById("gan").innerText = ganancia;

}
function eliminarRegistro(i){

    registros.splice(i,1);

    localStorage.setItem(
        "registros",
        JSON.stringify(registros)
    );

    mostrar();
    actualizarTotales();

}

function editar(i){

  let nuevoAbono = prompt(
    "Nuevo abono:",
    registros[i].abonado
  );

  if(nuevoAbono!==null){

    registros[i].abonado += Number(nuevoAbono);

registros[i].restante =
    registros[i].venta -
    registros[i].abonado;

if(registros[i].restante <= 0){
    registros[i].restante = 0;
    registros[i].estado = "PAGADA";
}
    
    localStorage.setItem(
  "registros",
  JSON.stringify(registros)
);

    mostrar();
    actualizarTotales();
  }

}
  mostrar();
actualizarTotales();
</script>
</body>
</html>
