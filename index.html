<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jersey Control Pro 2.0</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0b3d91,#0a84ff);
min-height:100vh;
padding:15px;
}

h1{
color:white;
text-align:center;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.box{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.box span{
display:block;
font-size:20px;
margin-top:5px;
color:#0a84ff;
}

input,
select,
button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#0a84ff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
background:#0a84ff;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.estado-pagada{
background:#28a745;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}

.estado-camino{
background:#007bff;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}

.estado-entregada{
background:#ffc107;
color:black;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}

.estado-stk{
background:#6c757d;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:bold;
}

</style>
</head>
<body>
<h1>⚽ Jersey Control Pro 2.0</h1>
  <div class="dashboard">
<div class="box">
Inversión
<span id="inv">0</span>
</div>
<div class="box">
Ganancia
<span id="gan">0</span>
</div>
<div class="box">
Ingresos
<span id="ing">0</span>
</div>
<div class="box">
Pendiente
<span id="pen">0</span>
</div>
</div>
<div class="card">
<h3>➕ Agregar Jersey</h3>
<input id="nombre" placeholder="Nombre de la playera">
<input id="equipo" placeholder="Equipo">
<select id="talla">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>2XL</option>
<option>3XL</option>
<option>4XL</option>
</select>
<input id="cliente" placeholder="Cliente">
<input id="foto" type="file" accept="image/*">
<input id="costo" type="number" placeholder="Costo">
<input id="venta" type="number" placeholder="Precio de venta">
<input id="venta" type="number" placeholder="Precio de venta">
<select id="estado">
<option>STK</option>
<option>EN CAMINO</option>
<option>ENTREGADA</option>
<option>PAGADA</option>
</select>
<button onclick="agregarRegistro()">
Guardar Jersey
</button>
</div>
<div class="card">
  <h3>🔍 Buscar</h3>
<input id="buscar" placeholder="Buscar playera, equipo o cliente">
<select id="filtro">
<option value="">Todos los estados</option>
<option value="STK">STK</option>
<option value="EN CAMINO">EN CAMINO</option>
<option value="ENTREGADA">ENTREGADA</option>
<option value="PAGADA">PAGADA</option>
</select>
<select id="filtro">
<option value="">Todos los estados</option>
<option value="STK">STK</option>
<option value="EN CAMINO">EN CAMINO</option>
<option value="ENTREGADA">ENTREGADA</option>
<option value="PAGADA">PAGADA</option>
</select>
</div>
<div class="card">
<h3>📦 Inventario</h3>
<div style="overflow-x:auto;">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Playera</th>
<th>Equipo</th>
<th>Talla</th>
<th>Cliente</th>
<th>Fecha</th>
<th>Venta</th>
<th>Abonado</th>
<th>Restante</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>
<script>

let registros =
JSON.parse(localStorage.getItem("registros"))
|| [];

document
.getElementById("buscar")
.addEventListener("keyup",mostrar);

document
.getElementById("filtro")
.addEventListener("change",mostrar);

function guardarDatos(){

localStorage.setItem(
"registros",
JSON.stringify(registros)
);

}

function convertirImagen(file){

return new Promise((resolve)=>{

const reader = new FileReader();

reader.onload = e => {
resolve(e.target.result);
};

reader.readAsDataURL(file);

});

}

async function agregarRegistro(){

const archivo =
document.getElementById("foto").files[0];

let imagen = "";

if(archivo){

imagen = await convertirImagen(
archivo
);

}

const registro={

nombre:
document.getElementById("nombre").value,

equipo:
document.getElementById("equipo").value,

talla:
document.getElementById("talla").value,

cliente:
document.getElementById("cliente").value,

foto:imagen,

costo:Number(
document.getElementById("costo").value
),

venta:Number(
document.getElementById("venta").value
),

abonado:Number(
document.getElementById("abonado").value || 0
),

fecha:new Date()
.toLocaleDateString(),

estado:
document.getElementById("estado").value

};

registro.restante =
registro.venta -
registro.abonado;

registro.ganancia =
registro.venta -
registro.costo;

if(registro.restante <= 0){

registro.restante = 0;

registro.estado = "PAGADA";

}

registros.push(registro);

guardarDatos();

actualizarTotales();

mostrar();

}
