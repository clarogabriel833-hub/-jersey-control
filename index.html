<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jersey Control Pro</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>⚽ Jersey Control Pro</h1>
<p>Control de ventas y abonos</p>
  
<div class="card">

<h2>➕ Agregar Jersey</h2>

<input id="playera" placeholder="Nombre de la playera">

<select id="talla">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>2XL</option>
<option>3XL</option>
<option>4XL</option>
</select>

<input id="cliente" placeholder="Cliente">

<input id="costo" type="number" placeholder="Costo">

<input id="venta" type="number" placeholder="Precio de venta">

<input id="abonado" type="number" placeholder="Abonado">

<select id="estado">
<option>STK</option>
<option>EN CAMINO</option>
<option>ENTREGADA</option>
<option>PAGADA</option>
</select>

<button onclick="agregarRegistro()">
Guardar Jersey
</button>

</div>
  
  <div class="card">

<h2>🔍 Buscar</h2>

<input
id="buscar"
placeholder="Buscar playera o cliente"
>

<select id="filtro">
<option value="">Todos los estados</option>
<option value="STK">STK</option>
<option value="EN CAMINO">EN CAMINO</option>
<option value="ENTREGADA">ENTREGADA</option>
<option value="PAGADA">PAGADA</option>
</select>

</div>

<div class="card">

<h2>📦 Inventario</h2>

<table>

<thead>
<tr>
<th>Playera</th>
<th>Talla</th>
<th>Cliente</th>
<th>Venta</th>
<th>Abonado</th>
<th>Restante</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla">

</tbody>

</table>

</div>
<div class="dashboard">

<div class="card">
<h3>💰 Inversión</h3>
<span id="inv">$0</span>
</div>

<div class="card">
<h3>📈 Ganancia</h3>
<span id="gan">$0</span>
</div>

<div class="card">
<h3>💵 Ingresos</h3>
<span id="ing">$0</span>
</div>

<div class="card">
<h3>⏳ Pendiente</h3>
<span id="pen">$0</span>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
