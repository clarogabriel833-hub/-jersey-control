<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Jersey Control Pro - Registrar</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<header>

<h1>➕ Registrar Jersey</h1>

<p>Agregar nueva playera al inventario</p>

<div class="menu">

<a href="index.html">
📦 Inventario
</a>

<a href="registrar.html" class="activo">
➕ Registrar
</a>

</div>

</header>

<div class="card">

<input id="playera" placeholder="⚽ Nombre de la playera">

<select id="talla">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>2XL</option>
<option>3XL</option>
<option>4XL</option>
</select>

<input id="cliente" placeholder="👤 Cliente">

<input id="costo" type="number" placeholder="💰 Costo">

<input id="venta" type="number" placeholder="💵 Precio de venta">

<input id="abonado" type="number" placeholder="💳 Abonado">

<select id="estado">
<option>STK</option>
<option>EN CAMINO</option>
<option>ENTREGADA</option>
<option>PAGADA</option>
</select>

<button onclick="agregarRegistro()">
💾 Guardar Jersey
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
